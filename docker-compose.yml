version: "3.9"

services:

  postgres:
    image: postgres:15
    container_name: aihirex-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: aihirex
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    container_name: aihirex-redis
    restart: always
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management
    container_name: aihirex-rabbitmq
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"

  auth-service:
    build:
      context: ./services/auth-service
    container_name: aihirex-auth-service
    restart: always
    ports:
      - "8000:8000"
    depends_on:
      - postgres

  resume-service:
    build:
      context: ./services/resume-service
    container_name: aihirex-resume-service
    restart: always
    ports:
      - "8001:8001"
    depends_on:
      - postgres

  job-service:
    build:
      context: ./services/job-service
    container_name: aihirex-job-service
    restart: always
    ports:
      - "8002:8002"
    depends_on:
      - postgres

  matching-service:
    build:
      context: ./services/matching-service
    container_name: aihirex-matching-service
    restart: always
    ports:
      - "8003:8003"
    depends_on:
      - postgres

  ai-worker:
    build:
      context: ./services/ai-worker
    container_name: aihirex-ai-worker
    restart: always
    ports:
      - "8004:8004"
    depends_on:
      - matching-service
      - rabbitmq
      - redis

  notification-service:
    build:
      context: ./services/notification-service
    container_name: aihirex-notification-service
    restart: always
    ports:
      - "8005:8005"
    depends_on:
      - rabbitmq
  
  nginx:
    image: nginx:latest
    container_name: aihirex-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - auth-service
      - resume-service
      - job-service
      - matching-service
      - ai-worker
      - notification-service