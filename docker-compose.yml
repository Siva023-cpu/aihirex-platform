version: '3.9'

services:

  postgres:
    image: postgres:15
    container_name: aihirex-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: aihirex
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    container_name: aihirex-redis
    restart: always
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management
    container_name: aihirex-rabbitmq
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"

  auth-service:
    build:
      context: ./services/auth-service
    container_name: aihirex-auth-service
    restart: always
    ports:
      - "8000:8000"
    depends_on:
      - postgres