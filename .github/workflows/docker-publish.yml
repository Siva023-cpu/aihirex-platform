name: AIHireX CI/CD

on:
  push:
    branches:
      - main

jobs:
  docker:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: vasgrills/aihirex-frontend:latest

      - name: Build and Push Auth Service
        uses: docker/build-push-action@v6
        with:
          context: ./services/auth-service
          push: true
          tags: vasgrills/aihirex-auth-service:latest

      - name: Build and Push Resume Service
        uses: docker/build-push-action@v6
        with:
          context: ./services/resume-service
          push: true
          tags: vasgrills/aihirex-resume-service:latest

      - name: Build and Push Job Service
        uses: docker/build-push-action@v6
        with:
          context: ./services/job-service
          push: true
          tags: vasgrills/aihirex-job-service:latest

      - name: Build and Push Matching Service
        uses: docker/build-push-action@v6
        with:
          context: ./services/matching-service
          push: true
          tags: vasgrills/aihirex-matching-service:latest

      - name: Build and Push AI Worker
        uses: docker/build-push-action@v6
        with:
          context: ./services/ai-worker
          push: true
          tags: vasgrills/aihirex-ai-worker:latest

      - name: Build and Push Notification Service
        uses: docker/build-push-action@v6
        with:
          context: ./services/notification-service
          push: true
          tags: vasgrills/aihirex-notification-service:latest