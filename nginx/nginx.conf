events {}

http {

    upstream frontend {
        server frontend:5173;
    }

    upstream auth_service {
        server auth-service:8000;
    }

    upstream resume_service {
        server resume-service:8001;
    }

    upstream job_service {
        server job-service:8002;
    }

    upstream matching_service {
        server matching-service:8003;
    }

    upstream ai_worker {
        server ai-worker:8004;
    }

    upstream notification_service {
        server notification-service:8005;
    }

    server {
        listen 80;

        # Frontend
        location / {
            proxy_pass http://frontend;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Auth Service
        location /auth/ {
            proxy_pass http://auth_service;
        }

        # Resume Service
        location /resume/ {
            proxy_pass http://resume_service;
        }

        # Job Service
        location /jobs/ {
            proxy_pass http://job_service;
        }

        # Matching Service
        location /match/ {
            proxy_pass http://matching_service;
        }

        # AI Worker
        location /ai/ {
            proxy_pass http://ai_worker;
        }

        # Notification Service
        location /notify/ {
            proxy_pass http://notification_service;
        }
    }
}